<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa do Espírito Santo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #fff; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }

    /* Dimensões fixas conhecidas */
    :root {
      --header-h: 280px;
      --footer-h: 34px;
      --panel-w:  300px;
    }

    /* Header */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding-top: 20px;
      gap: 80px;
      z-index: 20;
    }
    #header-question {
      font-size: 50px;
      color: #999;
      letter-spacing: .04em;
      font-style: italic;
    }
    h1 { color: #6b0000; font-size: 1.6rem; font-weight: 700; letter-spacing:.06em; text-transform: uppercase; line-height: 1; }
    .sub { color: #bbb; font-size: .72rem; margin-top: 2px; }

    /* Footer */
    #footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--footer-h);
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; color: #999; letter-spacing: .03em;
      z-index: 20;
    }

    /* Painel de mensagens */
    #credits-panel {
      position: fixed;
      top: var(--header-h); bottom: var(--footer-h); left: 0;
      width: var(--panel-w);
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
      mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
    }
    #credits-track {
      position: absolute; left: 0; right: 0;
      will-change: transform;
    }
    .credit-item { padding: 16px 20px; }
    .credit-msg  { font-size: 1.7rem; font-weight: 700; color: #1a0000; line-height: 1.4; margin-bottom: 5px; }
    .credit-footer { display: flex; align-items: center; gap: 5px; }
    .credit-city { font-size: 1rem; color: #800020; font-weight: 600; }
    .credit-sep  { font-size: .65rem; color: #ccc; }
    .credit-name { font-size: 1rem; color: #aaa; }
    #credits-empty {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #ddd; font-size: .76rem; text-align: center; padding: 20px; gap: 10px;
      pointer-events: none;
    }

    /* Área do mapa */
    #map-area {
      position: fixed;
      top: var(--header-h); bottom: var(--footer-h);
      left: var(--panel-w); right: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #map { display: block; }

    .municipio { fill: #800020; stroke: #d4b0b0; stroke-width: 0.5px; cursor: pointer; transition: fill .15s; }
    .municipio:hover { fill: #a8172e; }

    /* Tooltip */
    #tooltip {
      position: fixed; background: #fff;
      border: 1.5px solid #800020; border-radius: 6px;
      padding: 6px 13px; font-size: 50px; font-weight: 700; color: #6b0000;
      pointer-events: none; opacity: 0; transition: opacity .15s;
      box-shadow: 0 3px 12px rgba(100,0,0,.15); z-index: 99;
    }

    /* Modal */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 200;
      justify-content: center; align-items: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: #fff; border-radius: 14px;
      padding: 28px 28px 22px; width: 360px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.22);
      animation: popIn .18s ease;
    }
    @keyframes popIn { from { transform: scale(.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    #modal h2 { color: #6b0000; font-size: 1.1rem; margin-bottom: 3px; }
    #modal .cidade-label { color: #bbb; font-size: .8rem; margin-bottom: 18px; }
    #modal label { display: block; font-size: .78rem; color: #888; margin-bottom: 4px; margin-top: 14px; }
    #modal input, #modal textarea {
      width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px;
      padding: 9px 12px; font-size: .9rem; font-family: inherit;
      color: #333; outline: none; transition: border-color .15s; resize: none;
    }
    #modal input:focus, #modal textarea:focus { border-color: #800020; }
    #modal textarea { height: 90px; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel { flex: 1; padding: 10px; border: 1.5px solid #e0e0e0; border-radius: 8px; background: #fff; color: #999; cursor: pointer; font-size: .9rem; font-family: inherit; }
    .btn-cancel:hover { background: #f8f8f8; }
    .btn-send { flex: 2; padding: 10px; border: none; border-radius: 8px; background: #800020; color: #fff; cursor: pointer; font-size: .9rem; font-weight: 700; font-family: inherit; transition: background .15s; }
    .btn-send:hover { background: #a01535; }
  </style>
</head>
<body>
  <div id="header">
    <!-- Coloque o nome do arquivo da sua imagem no atributo src abaixo -->
    <img src="logo.png" alt="Logo" style="height: 108px; object-fit: contain;" />
    <p id="header-question">qual lugar do espírito santo marcou você?</p>
  </div>

  <div id="credits-panel">
    <div id="credits-empty">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Clique no mapa para deixar sua mensagem
    </div>
    <div id="credits-track"></div>
  </div>

  <div id="map-area"><svg id="map"></svg></div>

  <div id="footer">desenvolvido por elvys chaves</div>
  <div id="tooltip"></div>

  <div id="modal-overlay">
    <div id="modal">
      <h2>📍 Deixe sua mensagem</h2>
      <div class="cidade-label" id="modal-cidade"></div>
      <label>Sua mensagem</label>
      <textarea id="inp-msg" placeholder="O que você quer dizer sobre essa região?"></textarea>
      <label>Seu nome</label>
      <input id="inp-nome" type="text" placeholder="Digite seu nome..." maxlength="40"/>
      <div class="modal-buttons">
        <button class="btn-cancel" id="btn-cancel">Cancelar</button>
        <button class="btn-send" id="btn-send">Publicar ✦</button>
      </div>
    </div>
  </div>

05,-18.297314477980706],[-40.147974082537814,-18.286367447099963],[-40.12991455641162,-18.27418176917325],[-40.06754973183462,-18.278403870342288],[-40.035209964468265,-18.294460360757],[-39.98925986804841,-18.287717674830784],[-39.955255408810046,-18.31151326222721],[-39.95909611649256,-18.345085398472293],[-39.936831760677194,-18.411919064912862],[-39.97421013718804,-18.437614817269946],[-40.0018387385669,-18.43245498940621],[-40.02986300567312,-18.444101915870704],[-40.09043813800963,-18.487750008655947],[-40.12458366670279,-18.48854466670298],[-40.17664991925835,-18.471414847117444],[-40.199763350198396,-18.486743012579893],[-40.27211783686863,-18.494360780225804],[-40.318891190675856,-18.440038632277037],[-40.32990561495211,-18.40184999088433],[-40.354762307934095,-18.377936416032753],[-40.402849537975726,-18.385326109312473],[-40.423834680126326,-18.365393128989638],[-40.45792194714011,-18.37520367221168],[-40.48628902411912,-18.36639285584556],[-40.479987990753095,-18.25587628026608],[-40.42588977849044,-18.257178706332184]]]]}},{"type":"Feature","properties":{"nome":"Manten\u00f3polis"},"geometry":{"type":"MultiPolygon","coordinates":[[[[-41.02543125704682,-18.83718440633521],[-40.8979401028534,-18.90130224790039],[-40.90599849783234,-18.940462375638106],[-40.916585368220126,-18.94077280092398],[-41.06486215626347,-18.945040494123475],[-41.10367392531134,-18.934060694645268],[-41.126847126093935,-18.894506468698523],[-41.15295833465939,-18.88660909013737],[-41.16636073326117,-18.85823166915617],[-41.20055413826282,-18.862733502649007],[-41.21478437989514,-18.877639802434885],[-41.243582405703414,-18.85274906831478],[-41.245137177938375,-18.820541783676333],[-41.23254439131057,-18.797278795479997],[-41.1334736879603,-18.796808264789547],[-41.11050653894557,-18.838937363068794],[-41.02543125704682,-18.83718440633521]]]]}},{"type":"Feature","properties":{"nome":"Ponto Belo"},"geometry":{"type":"MultiPolygon","coordinates":[[[[-40.44274716734787,-18.125021548305     let pendingPin = null;

    // ── Mapa: dimensões reais via window ────────────────────────────
    const PANEL_W   = 300;
    const HEADER_H  = 280;
    const FOOTER_H  = 34;
    const W = window.innerWidth  - PANEL_W;
    const H = window.innerHeight - HEADER_H - FOOTER_H;

    const svg = d3.select('#map').attr('width', W).attr('height', H);
    const projection = d3.geoMercator().fitExtent([[10,10],[W-10,H-10]], geojson);
    const pathGen    = d3.geoPath().projection(projection);
    const tip        = document.getElementById('tooltip');

    svg.selectAll('path')
      .data(geojson.features).enter()
      .append('path')
      .attr('class', 'municipio')
      .attr('d', pathGen)
      .on('mousemove', function(event, d) {
        tip.textContent = d.properties.nome;
        tip.style.opacity = 1;
        tip.style.left = (event.clientX + 14) + 'px';
        tip.style.top  = (event.clientY - 10) + 'px';
      })
      .on('mouseleave', () => { tip.style.opacity = 0; })
      .on('click', function(event, d) {
        const svgEl = document.getElementById('map');
        const pt = svgEl.createSVGPoint();
        pt.x = event.clientX; pt.y = event.clientY;
        const svgP = pt.matrixTransform(svgEl.getScreenCTM().inverse());
        pendingPin = { cx: svgP.x, cy: svgP.y, cidade: d.properties.nome, svg };
        document.getElementById('modal-cidade').textContent = '📌 ' + d.properties.nome;
        document.getElementById('inp-msg').value = '';
        document.getElementById('inp-nome').value = '';
        document.getElementById('modal-overlay').classList.add('open');
        setTimeout(() => document.getElementById('inp-msg').focus(), 100);
      });

    // ── Pin ─────────────────────────────────────────────────────────
    function addPin(svg, cx, cy) {
      const pin = svg.append('g').attr('transform', `translate(${cx},${cy})`);
      pin.append('ellipse').attr('cx',0).attr('cy',2).attr('rx',5).attr('ry',2).attr('fill','rgba(0,0,0,0.3)');
      pin.append('path')
        .attr('d','M0,0 C-10,-10 -10,-26 0,-30 C10,-26 10,-10 0,0 Z')
        .attr('fill','#e03030').attr('stroke','#aa0000').attr('stroke-width',1);
      pin.append('circle').attr('cx',0).attr('cy',-20).attr('r',5).attr('fill','#fff').attr('opacity',0.85);
      pin.append('circle').attr('cx',0).attr('cy',0).attr('r',0)
        .attr('fill','none').attr('stroke','#e03030').attr('stroke-width',2).attr('opacity',1)
        .transition().duration(700).attr('r',18).attr('opacity',0).remove();
    }

    // ── Scroll de mensagens ─────────────────────────────────────────
    const SPEED = 10;
    const track = document.getElementById('credits-track');
    const panel = document.getElementById('credits-panel');
    let scrollY = 0, halfH = 0, running = false, lastTime = null;

    function buildItemHtml(m) {
      return `<div class="credit-item">
        <div class="credit-msg">"${esc(m.msg)}"</div>
        <div class="credit-footer">
          <span class="credit-city">📍 ${esc(m.cidade)}</span>
          <span class="credit-sep">·</span>
          <span class="credit-name">${esc(m.nome)}</span>
        </div>
      </div>`;
    }

    function addMessage(m) {
      document.getElementById('credits-empty').style.display = 'none';
      const html = buildItemHtml(m);
      const blocks = track.querySelectorAll('.credit-block');
      if (blocks.length === 0) {
        track.innerHTML = `<div class="credit-block">${html}</div><div class="credit-block">${html}</div>`;
        scrollY = -panel.clientHeight;
        track.style.transform = `translateY(${-scrollY}px)`;
        halfH = track.querySelector('.credit-block').offsetHeight;
        if (!running) startLoop();
      } else {
        blocks.forEach(b => b.insertAdjacentHTML('beforeend', html));
        halfH = blocks[0].offsetHeight;
      }
    }

    function startLoop() { running = true; lastTime = performance.now(); requestAnimationFrame(tick); }
    function tick(now) {
      const dt = (now - lastTime) / 1000; lastTime = now;
      scrollY += SPEED * dt;
      if (scrollY >= halfH) scrollY -= halfH;
      track.style.transform = `translateY(${-scrollY}px)`;
      requestAnimationFrame(tick);
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ── Modal ────────────────────────────────────────────────────────
    document.getElementById('btn-cancel').addEventListener('click', () => {
      document.getElementById('modal-overlay').classList.remove('open');
      pendingPin = null;
    });
    document.getElementById('btn-send').addEventListener('click', () => {
      const nome = document.getElementById('inp-nome').value.trim();
      const msg  = document.getElementById('inp-msg').value.trim();
      if (!msg)  { document.getElementById('inp-msg').focus();  return; }
      if (!nome) { document.getElementById('inp-nome').focus(); return; }
      if (!pendingPin) return;
      addPin(pendingPin.svg, pendingPin.cx, pendingPin.cy);
      addMessage({ nome, msg, cidade: pendingPin.cidade });
      document.getElementById('modal-overlay').classList.remove('open');
      pendingPin = null;
    });
    document.getElementById('inp-msg').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.ctrlKey) document.getElementById('btn-send').click();
    });
  </script>
</body>
</html>
